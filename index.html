<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="maimai">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>maimai Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #gameCanvas {
      display: block;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    /* ---- MENU ---- */
    #menu {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a0a3a 0%, #000 70%);
      color: #fff;
      z-index: 10;
    }
    #menu h1 {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #ff69b4, #ff9500, #ffdd00, #00e5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      margin-bottom: 8px;
      font-family: 'Arial Black', sans-serif;
    }
    #menu .subtitle {
      font-size: 16px;
      color: #aaa;
      letter-spacing: 4px;
      margin-bottom: 40px;
    }
    .song-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 20px 36px;
      margin: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      min-width: 280px;
    }
    .song-card:hover, .song-card:active {
      background: rgba(255,105,180,0.2);
      border-color: #ff69b4;
      transform: scale(1.03);
    }
    .song-card .name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .song-card .meta { font-size: 13px; color: #aaa; }
    .diff-row { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
    .diff-btn {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
    }
    .diff-btn.BASIC    { background:#5cb85c33; color:#5cb85c; border-color:#5cb85c; }
    .diff-btn.ADVANCED { background:#f0ad4e33; color:#f0ad4e; border-color:#f0ad4e; }
    .diff-btn.EXPERT   { background:#d9534f33; color:#d9534f; border-color:#d9534f; }
    .diff-btn.MASTER   { background:#9b59b633; color:#b060ff; border-color:#9b59b6; }
    .diff-btn.active, .diff-btn:hover { opacity: 1; filter: brightness(1.3); transform: scale(1.05); }
    .diff-btn:not(.active) { opacity: 0.5; }
    #startBtn {
      margin-top: 30px;
      padding: 16px 60px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #ff69b4, #ff9500);
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 30px rgba(255,105,180,0.5);
      transition: all 0.2s;
    }
    #startBtn:hover, #startBtn:active { transform: scale(1.05); }
    /* ---- RESULT ---- */
    #result {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      color: #fff;
      z-index: 10;
      font-family: 'Arial', sans-serif;
    }
    #result h2 {
      font-size: 36px;
      margin-bottom: 6px;
      letter-spacing: 4px;
    }
    #result .rank-badge {
      font-size: 96px;
      font-weight: 900;
      line-height: 1;
      margin: 10px 0;
    }
    #result .score-big { font-size: 48px; font-weight: 900; margin: 6px 0; }
    .judge-table { border-collapse: collapse; margin: 16px 0; }
    .judge-table td { padding: 5px 20px; font-size: 17px; text-align: center; }
    .judge-table .label { color: #aaa; text-align: right; }
    #retryBtn, #menuBtn {
      padding: 12px 40px;
      margin: 6px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      color: #fff;
      transition: transform 0.15s;
    }
    #retryBtn { background: linear-gradient(135deg, #ff69b4, #ff9500); }
    #menuBtn  { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); }
    #retryBtn:hover, #retryBtn:active,
    #menuBtn:hover, #menuBtn:active { transform: scale(1.05); }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- MENU -->
<div id="menu">
  <h1>maimai</h1>
  <div class="subtitle">SIMULATOR</div>
  <div class="song-card">
    <div class="name">METEOR</div>
    <div class="meta">BPM 175 &nbsp;|&nbsp; Demo Song</div>
    <div class="diff-row">
      <div class="diff-btn BASIC"    onclick="selectDiff('BASIC',6)"    id="d-BASIC">BASIC 6</div>
      <div class="diff-btn ADVANCED" onclick="selectDiff('ADVANCED',10)" id="d-ADVANCED">ADV 10</div>
      <div class="diff-btn EXPERT"   onclick="selectDiff('EXPERT',13)"   id="d-EXPERT">EXP 13</div>
      <div class="diff-btn MASTER"   onclick="selectDiff('MASTER',14)"   id="d-MASTER">MAS 14</div>
    </div>
  </div>
  <button id="startBtn" onclick="startGame()">PLAY</button>
</div>

<!-- RESULT -->
<div id="result">
  <h2>RESULT</h2>
  <div class="rank-badge" id="rankBadge">S</div>
  <div class="score-big" id="scoreBig">100000</div>
  <table class="judge-table">
    <tr><td class="label">Critical Perfect</td><td id="r-cp" style="color:#ffec42">0</td></tr>
    <tr><td class="label">Perfect</td><td id="r-p"  style="color:#ffe566">0</td></tr>
    <tr><td class="label">Great</td><td id="r-g"  style="color:#7dd4ff">0</td></tr>
    <tr><td class="label">Good</td><td id="r-go" style="color:#a8ff7c">0</td></tr>
    <tr><td class="label">Miss</td><td id="r-m"  style="color:#ff5c5c">0</td></tr>
    <tr><td class="label">Max Combo</td><td id="r-mc" style="color:#ffec42">0</td></tr>
  </table>
  <div style="display:flex">
    <button id="retryBtn" onclick="retryGame()">RETRY</button>
    <button id="menuBtn"  onclick="gotoMenu()">MENU</button>
  </div>
</div>

<script>
// ===================== CONSTANTS =====================
const BUTTON_COUNT = 8;
const APPROACH_MS  = 800;   // note travel time
const NOTE_RADIUS  = 22;    // visual note size
const HIT_ZONE     = 0.88;  // fraction of panel radius for judgment ring

// Timing windows (ms)
const T_CP   = 50;
const T_PERF = 100;
const T_GREAT= 175;
const T_GOOD = 275;
const T_MISS_WINDOW = 350;

// Colors
const BTN_COLORS = [
  '#ff6699','#ff9944','#ffdd00','#66dd44',
  '#44ddcc','#4499ff','#9966ff','#ff55cc'
];
const DIFF_COLORS = { BASIC:'#5cb85c', ADVANCED:'#f0ad4e', EXPERT:'#d9534f', MASTER:'#9b59b6' };

// ===================== AUDIO =====================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playHit(freq = 880, dur = 0.06, vol = 0.25) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playMiss() {
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length) * 0.15;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start();
  } catch(e) {}
}
function playBgm() {
  // Simple 4-beat click track at BPM 175
  try {
    const ctx = getAudioCtx();
    const bpm = 175, beat = 60/bpm;
    for (let i = 0; i < 200; i++) {
      const t = ctx.currentTime + i * beat;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = (i % 4 === 0) ? 660 : 440;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.04, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
      osc.start(t); osc.stop(t + 0.05);
    }
  } catch(e) {}
}
let bgmNodes = [];
function stopBgm() {
  bgmNodes.forEach(n => { try{ n.stop(); }catch(e){} });
  bgmNodes = [];
}

// ===================== CHART GENERATOR =====================
function generateChart(difficulty) {
  const bpm = 175;
  const beat = 60000 / bpm; // ms per beat
  const notes = [];
  let id = 0;
  const add = (time, btn, type='tap', duration=0) => {
    notes.push({ id: id++, time, btn, type, duration, judged: false, holding: false });
  };
  // Pattern factory: add beats at offset with button list
  const pattern = (startBeat, btnList, type='tap', dur=0) => {
    btnList.forEach((btn, i) => {
      if (btn >= 0) add(startBeat * beat + i * beat * 0.25, btn % 8, type, dur);
    });
  };
  // Slide pattern: multiple taps in sequence
  const slide = (startBeat, btns) => {
    btns.forEach((btn, i) => {
      add(startBeat * beat + i * (beat * 0.125), btn % 8, 'slide');
    });
  };

  const charts = {
    BASIC: () => {
      // Simple 4-beat patterns, 48 notes total
      for (let b = 2; b < 48; b += 2) {
        add(b * beat, b % 8, 'tap');
      }
      // Some holds
      for (let b = 10; b < 40; b += 8) {
        add(b * beat, (b/2) % 8, 'hold', beat * 2);
      }
    },
    ADVANCED: () => {
      for (let b = 2; b < 64; b++) {
        const btn = [0,2,4,6,1,3,5,7][b % 8];
        add(b * beat * 0.5, btn, 'tap');
      }
      for (let b = 4; b < 60; b += 6) {
        add(b * beat * 0.5, b % 8, 'hold', beat);
      }
    },
    EXPERT: () => {
      // 8th notes with cross patterns
      for (let b = 0; b < 80; b++) {
        const btn = [0,4,2,6,1,5,3,7][b % 8];
        add(b * beat * 0.5, btn, 'tap');
        if (b % 3 === 0) add(b * beat * 0.5 + beat * 0.125, (btn+4)%8, 'tap');
      }
      for (let b = 4; b < 70; b += 4) {
        add(b * beat * 0.5, b % 8, 'hold', beat * 0.75);
      }
      // Slides
      for (let b = 8; b < 60; b += 8) {
        slide(b * 0.5, [0,1,2,3,4]);
      }
    },
    MASTER: () => {
      // Dense 16th notes, complex
      for (let b = 0; b < 120; b++) {
        const btn = [0,4,2,6,1,5,3,7,0,2,4,6,1,3,5,7][b % 16];
        add(b * beat * 0.25, btn, 'tap');
        if (b % 5 === 0) add(b * beat * 0.25, (btn+3)%8, 'tap');
        if (b % 7 === 0) add(b * beat * 0.25, (btn+5)%8, 'tap');
      }
      for (let b = 4; b < 110; b += 3) {
        add(b * beat * 0.25, b % 8, 'hold', beat * 0.5);
      }
      for (let b = 4; b < 100; b += 6) {
        slide(b * 0.25, [0,1,2,3,4,5,6]);
      }
    }
  };

  (charts[difficulty] || charts.ADVANCED)();
  notes.sort((a, b) => a.time - b.time);
  return notes;
}

// ===================== CANVAS & LAYOUT =====================
const canvas = document.getElementById('gameCanvas');
const ctx2 = canvas.getContext('2d');
let W, H, CX, CY, RADIUS;

function resize() {
  const sz = Math.min(window.innerWidth, window.innerHeight) * 0.98;
  W = H = sz;
  canvas.width = canvas.height = sz;
  CX = CY = sz / 2;
  RADIUS = sz * 0.44;
}
window.addEventListener('resize', () => { resize(); if (gameState==='playing') drawFrame(); });
resize();

// Button positions (angle, 0=top, clockwise)
function btnAngle(btn) { return (btn / BUTTON_COUNT) * Math.PI * 2 - Math.PI / 2; }
function btnPos(btn, r) {
  const a = btnAngle(btn);
  return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) };
}

// ===================== GAME STATE =====================
let gameState = 'menu';  // menu | playing | result
let selectedDiff = 'ADVANCED';
let chart = [];
let chartIndex = 0;
let startTime = null;
let nowMs = 0;
let activeNotes = [];   // currently visible notes
let spawnedCount = 0;
let score = 0, combo = 0, maxCombo = 0;
let judgments = { cp:0, p:0, g:0, go:0, m:0 };
let totalNotes = 0;
let effects = [];       // visual hit effects
let buttonPresses = {}; // btn -> pressTime ms
let holdTouches = {};   // btn -> {touchId, note}
let comboEffect = 0;    // flash timer
let missEffect = {};    // btn -> timer
let lastJudgeText = null; // {text, color, time}

function selectDiff(diff, level) {
  selectedDiff = diff;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('d-' + diff).classList.add('active');
}
selectDiff('ADVANCED', 10);

function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  gameState = 'playing';
  chart = generateChart(selectedDiff);
  totalNotes = chart.length;
  chartIndex = 0; spawnedCount = 0;
  activeNotes = []; effects = []; buttonPresses = {}; holdTouches = {};
  score = 0; combo = 0; maxCombo = 0;
  judgments = { cp:0, p:0, g:0, go:0, m:0 };
  lastJudgeText = null;
  startTime = performance.now();
  try { getAudioCtx().resume(); } catch(e) {}
  playBgm();
  requestAnimationFrame(gameLoop);
}
function retryGame() { startGame(); }
function gotoMenu() {
  gameState = 'menu';
  document.getElementById('menu').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
}
function showResult() {
  gameState = 'result';
  stopBgm();
  const total = totalNotes;
  const pct = total > 0 ? (judgments.cp * 1.0 + judgments.p * 0.8 + judgments.g * 0.6 + judgments.go * 0.4) / total : 0;
  score = Math.round(pct * 100000) / 1000 * 1000;
  let rank = 'D';
  if (pct >= 1.00) rank = 'SSS+';
  else if (pct >= 0.995) rank = 'SSS';
  else if (pct >= 0.99) rank = 'SS+';
  else if (pct >= 0.97) rank = 'SS';
  else if (pct >= 0.95) rank = 'S+';
  else if (pct >= 0.90) rank = 'S';
  else if (pct >= 0.80) rank = 'A';
  else if (pct >= 0.70) rank = 'B';
  else if (pct >= 0.60) rank = 'C';
  const colors = { 'SSS+':'#ff69b4','SSS':'#ff9500','SS+':'#ffdd00','SS':'#ffdd00','S+':'#fff','S':'#fff','A':'#7dd4ff','B':'#a8ff7c','C':'#aaa','D':'#888' };
  document.getElementById('rankBadge').textContent = rank;
  document.getElementById('rankBadge').style.color = colors[rank] || '#fff';
  document.getElementById('scoreBig').textContent = score.toLocaleString();
  document.getElementById('r-cp').textContent = judgments.cp;
  document.getElementById('r-p').textContent  = judgments.p;
  document.getElementById('r-g').textContent  = judgments.g;
  document.getElementById('r-go').textContent = judgments.go;
  document.getElementById('r-m').textContent  = judgments.m;
  document.getElementById('r-mc').textContent = maxCombo;
  document.getElementById('result').style.display = 'flex';
}

// ===================== TOUCH INPUT =====================
canvas.addEventListener('touchstart', onTouch, { passive: false });
canvas.addEventListener('touchend',   onTouchEnd, { passive: false });
canvas.addEventListener('touchcancel',onTouchEnd, { passive: false });
canvas.addEventListener('mousedown',  onMouse, { passive: false });
canvas.addEventListener('mouseup',    onMouseUp, { passive: false });

function getTouches(e) {
  return Array.from(e.changedTouches).map(t => {
    const rect = canvas.getBoundingClientRect();
    const scale = canvas.width / rect.width;
    return { id: t.identifier, x: (t.clientX - rect.left) * scale, y: (t.clientY - rect.top) * scale };
  });
}
function onTouch(e) {
  e.preventDefault();
  getTouches(e).forEach(t => handlePress(t.x, t.y, t.id));
}
function onTouchEnd(e) {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => handleRelease(t.identifier));
}
function onMouse(e) {
  const rect = canvas.getBoundingClientRect();
  const scale = canvas.width / rect.width;
  handlePress((e.clientX - rect.left)*scale, (e.clientY - rect.top)*scale, 'mouse');
}
function onMouseUp(e) { handleRelease('mouse'); }

function whichButton(x, y) {
  const dx = x - CX, dy = y - CY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < RADIUS * 0.2) return -1; // center
  let angle = Math.atan2(dy, dx) + Math.PI/2;
  if (angle < 0) angle += Math.PI * 2;
  const btn = Math.round(angle / (Math.PI * 2 / BUTTON_COUNT)) % BUTTON_COUNT;
  return btn;
}

function handlePress(x, y, touchId) {
  if (gameState !== 'playing') return;
  const btn = whichButton(x, y);
  if (btn < 0) return;
  buttonPresses[btn] = nowMs;
  // Try to judge nearest note for this button
  judgePress(btn, touchId);
}
function handleRelease(touchId) {
  // Release any hold
  Object.entries(holdTouches).forEach(([btn, info]) => {
    if (info.touchId === touchId) {
      judgeHoldEnd(parseInt(btn), info.note);
      delete holdTouches[btn];
    }
  });
  // Also release by clearing button press
  Object.keys(buttonPresses).forEach(btn => {
    if (holdTouches[btn] && holdTouches[btn].touchId === touchId) delete buttonPresses[btn];
  });
}

// ===================== JUDGMENT =====================
function judgePress(btn, touchId) {
  // Find earliest unprocessed note for this button
  const note = activeNotes.find(n =>
    n.btn === btn && !n.judged &&
    (n.type === 'tap' || n.type === 'slide' || n.type === 'hold') &&
    Math.abs(nowMs - n.time) <= T_MISS_WINDOW
  );
  if (!note) {
    // Ghost hit
    addEffect(btn, null);
    playHit(440, 0.03, 0.1);
    return;
  }
  const diff = Math.abs(nowMs - note.time);
  if (note.type === 'hold') {
    note.judged = true;
    holdTouches[btn] = { touchId, note };
    note.holding = true;
    addEffect(btn, 'cp');
    playHit(880, 0.08);
  } else {
    note.judged = true;
    const j = calcJudge(diff);
    applyJudge(j, btn);
  }
}
function judgeHoldEnd(btn, note) {
  if (!note) return;
  const holdEnd = note.time + note.duration;
  const diff = Math.abs(nowMs - holdEnd);
  const j = calcJudge(diff);
  applyJudge(j, btn);
}
function calcJudge(diff) {
  if (diff <= T_CP)   return 'cp';
  if (diff <= T_PERF) return 'p';
  if (diff <= T_GREAT)return 'g';
  if (diff <= T_GOOD) return 'go';
  return 'm';
}
function applyJudge(j, btn) {
  judgments[j]++;
  if (j === 'm') {
    combo = 0;
    playMiss();
    missEffect[btn] = 12;
    lastJudgeText = { text: 'MISS', color: '#ff5555', time: nowMs };
  } else {
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    comboEffect = 15;
    const sounds = { cp: [1046,0.08], p: [880,0.07], g: [698,0.06], go: [587,0.05] };
    const [freq,vol] = sounds[j] || [880,0.06];
    playHit(freq, 0.07, vol);
    addEffect(btn, j);
    const labels = { cp:'Critical\nPerfect', p:'Perfect', g:'Great', go:'Good' };
    const cols   = { cp:'#ffec42', p:'#ffe566', g:'#7dd4ff', go:'#a8ff7c' };
    lastJudgeText = { text: labels[j], color: cols[j], time: nowMs };
  }
}
function addEffect(btn, judge) {
  const pos = btnPos(btn, RADIUS * HIT_ZONE);
  effects.push({ x: pos.x, y: pos.y, judge, t: 0, maxT: 20, btn });
}

// Auto-miss notes that are too late
function checkMissedNotes() {
  activeNotes.forEach(note => {
    if (!note.judged && nowMs - note.time > T_MISS_WINDOW) {
      note.judged = true;
      judgments.m++;
      combo = 0;
      missEffect[note.btn] = 12;
      lastJudgeText = { text: 'MISS', color: '#ff5555', time: nowMs };
    }
  });
}

// ===================== SPAWN NOTES =====================
function spawnNotes() {
  while (spawnedCount < chart.length) {
    const note = chart[spawnedCount];
    if (note.time - nowMs <= APPROACH_MS + 200) {
      activeNotes.push(note);
      spawnedCount++;
    } else break;
  }
}

// ===================== GAME LOOP =====================
let lastFrame = null;
function gameLoop(ts) {
  if (gameState !== 'playing') return;
  nowMs = ts - startTime;
  if (!lastFrame) lastFrame = ts;
  lastFrame = ts;

  spawnNotes();
  checkMissedNotes();

  // Remove fully-judged notes
  activeNotes = activeNotes.filter(n => {
    if (n.type === 'hold' && n.holding) return true; // keep until released
    return !n.judged || (n.judged && nowMs - n.time < 400);
  });

  drawFrame();

  // Check end
  if (spawnedCount >= chart.length && activeNotes.every(n => n.judged)) {
    showResult();
    return;
  }
  requestAnimationFrame(gameLoop);
}

// ===================== DRAW =====================
function drawFrame() {
  ctx2.clearRect(0, 0, W, H);
  drawBackground();
  drawPanel();
  drawNotes();
  drawEffects();
  drawHUD();
}

function drawBackground() {
  const grad = ctx2.createRadialGradient(CX, CY, RADIUS*0.1, CX, CY, RADIUS*1.4);
  grad.addColorStop(0, '#0d0020');
  grad.addColorStop(1, '#000005');
  ctx2.fillStyle = grad;
  ctx2.fillRect(0, 0, W, H);
  // Subtle star field
  ctx2.fillStyle = 'rgba(255,255,255,0.4)';
  for (let i = 0; i < 40; i++) {
    const x = (Math.sin(i * 1.7) * 0.5 + 0.5) * W;
    const y = (Math.cos(i * 2.3) * 0.5 + 0.5) * H;
    const r = (Math.sin(i * 0.9) * 0.5 + 0.5) * 1.5 + 0.3;
    ctx2.beginPath(); ctx2.arc(x, y, r, 0, Math.PI*2); ctx2.fill();
  }
}

function drawPanel() {
  // Outer glow ring
  const glowGrad = ctx2.createRadialGradient(CX, CY, RADIUS*0.9, CX, CY, RADIUS*1.05);
  glowGrad.addColorStop(0, 'rgba(150,100,255,0.35)');
  glowGrad.addColorStop(1, 'rgba(150,100,255,0)');
  ctx2.fillStyle = glowGrad;
  ctx2.beginPath(); ctx2.arc(CX, CY, RADIUS*1.05, 0, Math.PI*2); ctx2.fill();

  // Panel background circle
  const bgGrad = ctx2.createRadialGradient(CX, CY, 0, CX, CY, RADIUS);
  bgGrad.addColorStop(0, '#0a0022');
  bgGrad.addColorStop(0.8, '#12003a');
  bgGrad.addColorStop(1, '#200050');
  ctx2.beginPath(); ctx2.arc(CX, CY, RADIUS, 0, Math.PI*2);
  ctx2.fillStyle = bgGrad; ctx2.fill();

  // Grid lines (dividers between 8 sections)
  ctx2.strokeStyle = 'rgba(180,130,255,0.12)';
  ctx2.lineWidth = 1;
  for (let b = 0; b < BUTTON_COUNT; b++) {
    const a = btnAngle(b) - (Math.PI / BUTTON_COUNT);
    ctx2.beginPath();
    ctx2.moveTo(CX + RADIUS*0.1*Math.cos(a), CY + RADIUS*0.1*Math.sin(a));
    ctx2.lineTo(CX + RADIUS*Math.cos(a),     CY + RADIUS*Math.sin(a));
    ctx2.stroke();
  }

  // Concentric guide circles
  [0.25, 0.5, 0.75].forEach(r => {
    ctx2.beginPath(); ctx2.arc(CX, CY, RADIUS*r, 0, Math.PI*2);
    ctx2.strokeStyle = 'rgba(180,130,255,0.08)'; ctx2.lineWidth = 1; ctx2.stroke();
  });

  // Judgment ring
  ctx2.beginPath(); ctx2.arc(CX, CY, RADIUS*HIT_ZONE, 0, Math.PI*2);
  ctx2.strokeStyle = 'rgba(220,180,255,0.55)'; ctx2.lineWidth = 2.5; ctx2.stroke();

  // Outer ring (panel edge)
  ctx2.beginPath(); ctx2.arc(CX, CY, RADIUS, 0, Math.PI*2);
  ctx2.strokeStyle = 'rgba(180,130,255,0.7)'; ctx2.lineWidth = 3; ctx2.stroke();

  // Center circle
  const centerGrad = ctx2.createRadialGradient(CX, CY, 0, CX, CY, RADIUS*0.15);
  centerGrad.addColorStop(0, '#4422aa');
  centerGrad.addColorStop(1, '#1a0060');
  ctx2.beginPath(); ctx2.arc(CX, CY, RADIUS*0.12, 0, Math.PI*2);
  ctx2.fillStyle = centerGrad; ctx2.fill();
  ctx2.beginPath(); ctx2.arc(CX, CY, RADIUS*0.12, 0, Math.PI*2);
  ctx2.strokeStyle = 'rgba(200,160,255,0.6)'; ctx2.lineWidth = 2; ctx2.stroke();

  // Buttons
  for (let b = 0; b < BUTTON_COUNT; b++) {
    drawButton(b);
  }
}

function drawButton(btn) {
  const pos = btnPos(btn, RADIUS * 0.93);
  const r = RADIUS * 0.07;
  const pressed = buttonPresses[btn] && (nowMs - buttonPresses[btn]) < 120;
  const col = BTN_COLORS[btn];

  // Glow when pressed
  if (pressed) {
    const g = ctx2.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, r*2.2);
    g.addColorStop(0, col + 'aa');
    g.addColorStop(1, col + '00');
    ctx2.fillStyle = g;
    ctx2.beginPath(); ctx2.arc(pos.x, pos.y, r*2.2, 0, Math.PI*2); ctx2.fill();
  }

  // Button circle
  const bg = ctx2.createRadialGradient(pos.x - r*0.3, pos.y - r*0.3, 0, pos.x, pos.y, r);
  if (pressed) {
    bg.addColorStop(0, '#fff');
    bg.addColorStop(0.4, col);
    bg.addColorStop(1, col + '99');
  } else {
    bg.addColorStop(0, col + 'cc');
    bg.addColorStop(1, col + '44');
  }
  ctx2.beginPath(); ctx2.arc(pos.x, pos.y, r, 0, Math.PI*2);
  ctx2.fillStyle = bg; ctx2.fill();
  ctx2.strokeStyle = col; ctx2.lineWidth = 1.5; ctx2.stroke();

  // Button number
  ctx2.fillStyle = pressed ? '#000' : '#fff';
  ctx2.font = `bold ${r*0.95}px Arial`;
  ctx2.textAlign = 'center'; ctx2.textBaseline = 'middle';
  ctx2.fillText(btn + 1, pos.x, pos.y);
}

function drawNotes() {
  activeNotes.forEach(note => {
    if (note.judged && note.type !== 'hold') return;

    const elapsed = nowMs - (note.time - APPROACH_MS);
    const progress = Math.max(0, Math.min(1, elapsed / APPROACH_MS));
    // progress 0 = center, 1 = judgment ring
    const r = progress * RADIUS * HIT_ZONE;

    if (note.type === 'hold') {
      drawHoldNote(note, progress, r);
    } else if (note.type === 'slide') {
      drawSlideNote(note, progress, r);
    } else {
      drawTapNote(note, progress, r);
    }
  });
}

function notePos(note, r) {
  return btnPos(note.btn, r);
}

function drawTapNote(note, progress, r) {
  const pos = notePos(note, r);
  const col = BTN_COLORS[note.btn];
  const nr = NOTE_RADIUS * (0.6 + progress * 0.4);

  // Approach circle (ring that shrinks)
  const approachR = NOTE_RADIUS * (1 + (1-progress) * 2.5);
  ctx2.beginPath(); ctx2.arc(pos.x, pos.y, approachR, 0, Math.PI*2);
  ctx2.strokeStyle = col + Math.floor((1-progress)*0.6*255).toString(16).padStart(2,'0');
  ctx2.lineWidth = 2;
  ctx2.stroke();

  // Note body
  const g = ctx2.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, nr);
  g.addColorStop(0, '#fff');
  g.addColorStop(0.3, col);
  g.addColorStop(1, col + '88');
  ctx2.beginPath(); ctx2.arc(pos.x, pos.y, nr, 0, Math.PI*2);
  ctx2.fillStyle = g; ctx2.fill();
  ctx2.strokeStyle = '#fff8'; ctx2.lineWidth = 1.5; ctx2.stroke();
}

function drawSlideNote(note, progress, r) {
  const pos = notePos(note, r);
  const col = '#00e5ff';
  const nr = NOTE_RADIUS * 0.75 * (0.6 + progress * 0.4);

  const g = ctx2.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, nr);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.5, '#00e5ff');
  g.addColorStop(1, '#00a0cc88');
  ctx2.beginPath(); ctx2.arc(pos.x, pos.y, nr, 0, Math.PI*2);
  ctx2.fillStyle = g; ctx2.fill();
  // Triangle marker
  const a = btnAngle(note.btn);
  ctx2.save();
  ctx2.translate(pos.x, pos.y);
  ctx2.rotate(a + Math.PI/2);
  ctx2.fillStyle = '#fff';
  ctx2.beginPath();
  ctx2.moveTo(0, -nr*0.6);
  ctx2.lineTo(nr*0.45, nr*0.4);
  ctx2.lineTo(-nr*0.45, nr*0.4);
  ctx2.closePath(); ctx2.fill();
  ctx2.restore();
}

function drawHoldNote(note, progress, r) {
  const pos = notePos(note, r);
  const col = BTN_COLORS[note.btn];
  const nr = NOTE_RADIUS * (0.6 + progress * 0.4);

  if (!note.judged) {
    // Trail from current position toward hit zone
    const endPos = notePos(note, RADIUS * HIT_ZONE);
    const g = ctx2.createLinearGradient(pos.x, pos.y, endPos.x, endPos.y);
    g.addColorStop(0, col + '00');
    g.addColorStop(1, col + '55');
    ctx2.beginPath();
    ctx2.moveTo(pos.x, pos.y);
    ctx2.lineTo(endPos.x, endPos.y);
    ctx2.strokeStyle = g; ctx2.lineWidth = nr * 1.2; ctx2.lineCap = 'round'; ctx2.stroke();
  }
  // Head
  const bg = ctx2.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, nr);
  bg.addColorStop(0, '#fff');
  bg.addColorStop(0.4, col);
  bg.addColorStop(1, col + '66');
  ctx2.beginPath(); ctx2.arc(pos.x, pos.y, nr, 0, Math.PI*2);
  ctx2.fillStyle = bg; ctx2.fill();
  ctx2.strokeStyle = '#fffc'; ctx2.lineWidth = 2; ctx2.stroke();
  // "H" label
  ctx2.fillStyle = '#fff'; ctx2.font = `bold ${nr*0.8}px Arial`;
  ctx2.textAlign = 'center'; ctx2.textBaseline = 'middle';
  ctx2.fillText('H', pos.x, pos.y);
}

function drawEffects() {
  effects = effects.filter(e => e.t < e.maxT);
  effects.forEach(e => {
    const frac = e.t / e.maxT;
    e.t++;
    const cols = { cp:'#ffec42', p:'#ffe566', g:'#7dd4ff', go:'#a8ff7c', null:'#ffffff55' };
    const col = cols[e.judge] || '#ffffff55';
    const r = NOTE_RADIUS * (1.2 + frac * 2.5);
    ctx2.beginPath(); ctx2.arc(e.x, e.y, r, 0, Math.PI*2);
    ctx2.strokeStyle = col + Math.floor((1-frac)*200).toString(16).padStart(2,'0');
    ctx2.lineWidth = 3 * (1-frac) + 1;
    ctx2.stroke();
    if (frac < 0.5) {
      const g = ctx2.createRadialGradient(e.x, e.y, 0, e.x, e.y, r*0.6);
      g.addColorStop(0, col + Math.floor((1-frac*2)*120).toString(16).padStart(2,'0'));
      g.addColorStop(1, col + '00');
      ctx2.beginPath(); ctx2.arc(e.x, e.y, r*0.6, 0, Math.PI*2);
      ctx2.fillStyle = g; ctx2.fill();
    }
  });

  // Miss effects per button
  Object.keys(missEffect).forEach(btn => {
    if (missEffect[btn] <= 0) { delete missEffect[btn]; return; }
    const pos = btnPos(parseInt(btn), RADIUS * HIT_ZONE);
    const frac = 1 - missEffect[btn] / 12;
    ctx2.beginPath(); ctx2.arc(pos.x, pos.y, NOTE_RADIUS * (1 + frac * 1.5), 0, Math.PI*2);
    ctx2.strokeStyle = `rgba(255,80,80,${(1-frac)*0.8})`;
    ctx2.lineWidth = 3; ctx2.stroke();
    missEffect[btn]--;
  });
}

function drawHUD() {
  // Combo
  if (combo > 0) {
    const scale = 1 + (comboEffect > 0 ? comboEffect * 0.01 : 0);
    if (comboEffect > 0) comboEffect--;
    ctx2.save();
    ctx2.translate(CX, CY);
    ctx2.scale(scale, scale);
    ctx2.fillStyle = '#ffec42';
    ctx2.font = `bold ${RADIUS * 0.12}px Arial`;
    ctx2.textAlign = 'center'; ctx2.textBaseline = 'bottom';
    ctx2.fillText(combo, 0, -RADIUS * 0.04);
    ctx2.fillStyle = 'rgba(255,236,66,0.6)';
    ctx2.font = `${RADIUS * 0.045}px Arial`;
    ctx2.fillText('COMBO', 0, RADIUS * 0.02);
    ctx2.restore();
  }

  // Judgment text
  if (lastJudgeText && nowMs - lastJudgeText.time < 600) {
    const age = nowMs - lastJudgeText.time;
    const alpha = 1 - age / 600;
    const lines = lastJudgeText.text.split('\n');
    ctx2.save();
    ctx2.globalAlpha = alpha;
    ctx2.fillStyle = lastJudgeText.color;
    ctx2.textAlign = 'center'; ctx2.textBaseline = 'middle';
    ctx2.font = `bold ${RADIUS * 0.07}px Arial`;
    lines.forEach((line, i) => {
      ctx2.fillText(line, CX, CY + RADIUS * 0.22 + i * RADIUS * 0.085);
    });
    ctx2.restore();
  }

  // Score top-left
  ctx2.fillStyle = '#fff';
  ctx2.font = `bold ${W * 0.04}px 'Arial Narrow', Arial`;
  ctx2.textAlign = 'left'; ctx2.textBaseline = 'top';
  const displayScore = Math.round(
    (judgments.cp + judgments.p * 0.8 + judgments.g * 0.6 + judgments.go * 0.4) /
    Math.max(1, totalNotes) * 100000
  );
  ctx2.fillText(displayScore.toLocaleString(), W * 0.02, H * 0.02);

  // Difficulty top-right
  const diffCol = DIFF_COLORS[selectedDiff] || '#fff';
  ctx2.fillStyle = diffCol;
  ctx2.font = `bold ${W * 0.03}px Arial`;
  ctx2.textAlign = 'right'; ctx2.textBaseline = 'top';
  ctx2.fillText(selectedDiff, W * 0.98, H * 0.02);

  // Progress bar bottom
  const pct = spawnedCount / Math.max(1, totalNotes);
  ctx2.fillStyle = 'rgba(255,255,255,0.12)';
  ctx2.fillRect(W*0.05, H*0.965, W*0.9, 6);
  const barGrad = ctx2.createLinearGradient(W*0.05, 0, W*0.95, 0);
  barGrad.addColorStop(0, '#ff69b4');
  barGrad.addColorStop(1, '#00e5ff');
  ctx2.fillStyle = barGrad;
  ctx2.fillRect(W*0.05, H*0.965, W*0.9*pct, 6);

  // Judge counts bottom-right
  const jLabels = [['CP','#ffec42',judgments.cp],['P','#ffe566',judgments.p],
                   ['G','#7dd4ff',judgments.g],['GO','#a8ff7c',judgments.go],['M','#ff5c5c',judgments.m]];
  const bx = W * 0.98, by = H * 0.95 - jLabels.length * W * 0.028;
  jLabels.forEach(([label, col, val], i) => {
    ctx2.fillStyle = col;
    ctx2.font = `${W * 0.025}px Arial`;
    ctx2.textAlign = 'right'; ctx2.textBaseline = 'top';
    ctx2.fillText(`${label}: ${val}`, bx, by + i * W * 0.028);
  });
}

// Initial render
drawFrame();
</script>
</body>
</html>
