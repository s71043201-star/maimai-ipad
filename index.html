<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="maimai DX">
  <link rel="manifest" href="manifest.json">
  <title>maimai DX Simulator</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Arial Black',Arial,sans-serif}
    canvas{display:block;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
    #overlay{position:fixed;inset:0;z-index:20;pointer-events:none}
    .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all}
    /* MENU */
    #menu{background:radial-gradient(ellipse at 50% 30%,#1a003a 0%,#05000f 70%)}
    .logo{font-size:clamp(36px,8vw,72px);font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,#ff69b4 0%,#ffaa00 40%,#ffe000 60%,#00e5ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
    .logo-sub{font-size:clamp(12px,2.5vw,20px);color:#c090ff;letter-spacing:8px;margin-bottom:32px}
    .song-select{background:rgba(255,255,255,0.06);border:1px solid rgba(200,160,255,0.3);border-radius:20px;padding:20px 28px;width:min(380px,90vw);margin-bottom:16px}
    .song-title{font-size:clamp(18px,4vw,26px);color:#fff;font-weight:900;margin-bottom:4px}
    .song-bpm{font-size:13px;color:#aaa;margin-bottom:12px}
    .diff-row{display:flex;gap:6px;flex-wrap:wrap}
    .db{padding:7px 12px;border-radius:30px;font-size:12px;font-weight:900;cursor:pointer;border:2px solid;transition:all .15s;flex:1;text-align:center;min-width:60px}
    .db.BASIC{color:#76cf60;border-color:#76cf60;background:#76cf6022}
    .db.ADVANCED{color:#f5a623;border-color:#f5a623;background:#f5a62322}
    .db.EXPERT{color:#e84545;border-color:#e84545;background:#e8454522}
    .db.MASTER{color:#c87fff;border-color:#c87fff;background:#c87fff22}
    .db.RE:MASTER{color:#f0c0ff;border-color:#f0c0ff;background:#f0c0ff15}
    .db.sel{filter:brightness(1.4);transform:scale(1.05)}
    .db:not(.sel){opacity:.55}
    .speed-row{display:flex;align-items:center;gap:10px;margin-top:14px;color:#ccc;font-size:14px}
    .speed-row input{flex:1;accent-color:#c87fff}
    #playBtn{margin-top:24px;padding:16px 64px;font-size:clamp(18px,4vw,24px);font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,#ff69b4,#ff9500);border:none;border-radius:50px;color:#fff;cursor:pointer;box-shadow:0 0 30px rgba(255,105,180,.5);transition:transform .15s}
    #playBtn:active{transform:scale(.97)}
    /* RESULT */
    #result{display:none;background:rgba(0,0,0,.92)}
    .result-rank{font-size:clamp(72px,18vw,130px);font-weight:900;line-height:1;margin:8px 0}
    .result-ach{font-size:clamp(28px,6vw,48px);font-weight:900;margin-bottom:12px}
    .result-table{border-collapse:collapse;margin:8px 0}
    .result-table td{padding:4px 16px;font-size:clamp(13px,2.5vw,17px);text-align:center}
    .result-table .lbl{color:#888;text-align:right;font-weight:normal}
    .rbtn{padding:12px 36px;margin:6px;font-size:clamp(14px,3vw,18px);font-weight:900;border:none;border-radius:30px;color:#fff;cursor:pointer}
    #retryBtn{background:linear-gradient(135deg,#ff69b4,#ff9500)}
    #menuBtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3)}
    /* COUNTDOWN */
    #countdown{display:none;color:#fff;font-size:clamp(60px,15vw,120px);font-weight:900;text-shadow:0 0 40px rgba(255,200,0,.8)}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <!-- MENU -->
  <div class="screen" id="menu">
    <div class="logo">maimai</div>
    <div class="logo-sub">でらっくす SIMULATOR</div>
    <div class="song-select">
      <div class="song-title">METEOR</div>
      <div class="song-bpm">BPM 175 &nbsp;·&nbsp; Demo Song</div>
      <div class="diff-row" id="diffRow"></div>
      <div class="speed-row">
        <span>速度</span>
        <input type="range" id="speedSlider" min="1" max="7" step="0.5" value="5">
        <span id="speedVal">×5.0</span>
      </div>
    </div>
    <button id="playBtn" onclick="beginCountdown()">PLAY</button>
  </div>
  <!-- COUNTDOWN -->
  <div class="screen" id="countdown" style="background:rgba(0,0,0,.5)">
    <div id="cdNum"></div>
  </div>
  <!-- RESULT -->
  <div class="screen" id="result">
    <div class="result-rank" id="rRank">S</div>
    <div class="result-ach" id="rAch">99.9999%</div>
    <table class="result-table">
      <tr><td class="lbl">Critical Perfect</td><td id="rCP" style="color:#ffec42">0</td></tr>
      <tr><td class="lbl">Perfect</td><td id="rP" style="color:#ffe082">0</td></tr>
      <tr><td class="lbl">Great</td><td id="rG" style="color:#64b5f6">0</td></tr>
      <tr><td class="lbl">Good</td><td id="rGO" style="color:#81c784">0</td></tr>
      <tr><td class="lbl">Miss</td><td id="rM" style="color:#ef5350">0</td></tr>
      <tr><td class="lbl">Max Combo</td><td id="rMC" style="color:#ffec42">0</td></tr>
    </table>
    <div style="display:flex">
      <button class="rbtn" id="retryBtn" onclick="retryGame()">RETRY</button>
      <button class="rbtn" id="menuBtn" onclick="gotoMenu()">MENU</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ============================================================
//  CONSTANTS
// ============================================================
const BTNS = 8;
const BTN_COLORS = ['#ff4d88','#ff8800','#ffdd00','#44dd44','#00ddcc','#3399ff','#aa55ff','#ff44cc'];
const DIFF_LIST   = [{k:'BASIC',lv:6},{k:'ADVANCED',lv:10},{k:'EXPERT',lv:13},{k:'MASTER',lv:14},{k:'RE:MASTER',lv:15}];
const DIFF_COLORS = {BASIC:'#76cf60',ADVANCED:'#f5a623',EXPERT:'#e84545',MASTER:'#c87fff','RE:MASTER':'#f0c0ff'};
// Timing windows (ms) - maimai DX approximate
const TW = { cp:50, p:100, g:166, go:250, miss:350 };
// Note types
const TYPE = { TAP:0, HOLD:1, SLIDE:2, TOUCH:3, BREAK:4 };
// Judge weights for achievement
const ACH_W = { cp:1.01, p:1.0, g:0.8, go:0.5, m:0.0 }; // break CPs contribute >100%

// ============================================================
//  AUDIO
// ============================================================
let AC = null;
function ac(){ return AC || (AC = new (window.AudioContext||window.webkitAudioContext)()); }
function beep(f,dur,vol,type='sine'){
  try{
    const ctx=ac(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(); o.stop(ctx.currentTime+dur+0.01);
  }catch(e){}
}
function sndTap(){ beep(880,0.05,0.22); beep(1760,0.03,0.1); }
function sndBreak(){ beep(660,0.04,0.3); beep(1320,0.08,0.25); beep(2640,0.06,0.15); }
function sndGreat(){ beep(698,0.06,0.15); }
function sndGood(){ beep(587,0.07,0.12); }
function sndMiss(){ try{const c=ac(),b=c.createBuffer(1,c.sampleRate*0.08,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*0.12;const s=c.createBufferSource();s.buffer=b;s.connect(c.destination);s.start();}catch(e){} }
function sndHold(){ beep(1046,0.04,0.18,'square'); }
let bgmTimer=null;
function startBgm(){
  if(!AC) return;
  const bpm=175, beat=60/bpm, ctx=ac();
  const play=(f,t,v=0.04,d=0.04)=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g);g.connect(ctx.destination); o.type='square';o.frequency.value=f; g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+d); o.start(t);o.stop(t+d+.01); };
  const base=ctx.currentTime+0.1;
  for(let i=0;i<300;i++){
    const t=base+i*beat;
    if(i%4===0) play(660,t,0.05,0.05);
    else play(440,t,0.025,0.03);
    if(i%8===4) play(330,t+beat*0.5,0.02,0.02);
  }
}
function stopBgm(){}

// ============================================================
//  SPEED & DIFFICULTY
// ============================================================
let selectedDiff='MASTER', noteSpeed=5.0;
const diffRow=document.getElementById('diffRow');
DIFF_LIST.forEach(d=>{
  const b=document.createElement('div');
  b.className='db '+d.k+(d.k===selectedDiff?' sel':'');
  b.textContent=d.k+' '+d.lv;
  b.onclick=()=>{ selectedDiff=d.k; document.querySelectorAll('.db').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
  diffRow.appendChild(b);
});
const spd=document.getElementById('speedSlider');
spd.oninput=()=>{ noteSpeed=+spd.value; document.getElementById('speedVal').textContent='×'+noteSpeed.toFixed(1); };

// ============================================================
//  CHART GENERATOR
// ============================================================
function buildChart(diff){
  const bpm=175, beat=60000/bpm;
  const n=[], id=(()=>{let i=0;return()=>i++;})();
  const tap=(t,btn,brk=false)=>n.push({id:id(),time:t,btn:btn%BTNS,type:brk?TYPE.BREAK:TYPE.TAP,dur:0,judged:false});
  const hold=(t,btn,dur)=>n.push({id:id(),time:t,btn:btn%BTNS,type:TYPE.HOLD,dur,judged:false,holding:false,holdEnd:false});
  const slide=(t,src,dst)=>n.push({id:id(),time:t,btn:src%BTNS,dst:dst%BTNS,type:TYPE.SLIDE,dur:beat*0.75,judged:false,slideOk:false});
  const touch=(t,px,py)=>n.push({id:id(),time:t,btn:-1,type:TYPE.TOUCH,px,py,judged:false});

  // Scale beat subdivision based on difficulty
  const sub = {BASIC:1, ADVANCED:0.5, EXPERT:0.25, MASTER:0.25,'RE:MASTER':0.125}[diff]||0.25;
  const total = 64; // total beats of chart

  if(diff==='BASIC'){
    for(let b=2;b<total;b+=2){ tap(b*beat,(b/2)%8); }
    hold(4*beat,0,beat*3); hold(12*beat,4,beat*3); hold(20*beat,2,beat*3);
  } else if(diff==='ADVANCED'){
    const pat=[0,2,4,6,1,3,5,7];
    for(let b=0;b<total*2;b++) tap(b*beat*0.5, pat[b%8]);
    for(let b=0;b<total;b+=6){ hold(b*beat*0.5, b%8, beat); }
    for(let b=4;b<total;b+=8){ slide(b*beat*0.5, b%8, (b+4)%8); }
  } else {
    // Complex patterns for EXPERT/MASTER/RE:MASTER
    const density = {EXPERT:0.5,MASTER:0.25,'RE:MASTER':0.125}[diff]||0.25;
    const patterns=[
      [0,4],[2,6],[1,5],[3,7],[0,2,4,6],[1,3,5,7],
      [0,3,6,1],[4,7,2,5],[0,1,2,3,4,5,6,7]
    ];
    let time=beat*2;
    let pi=0;
    while(time < total*beat){
      const pat=patterns[pi%patterns.length];
      pat.forEach((btn,i)=>{
        const t=time+i*beat*density;
        if(Math.random()<0.08) tap(t,btn,true); // BREAK
        else tap(t,btn);
      });
      // Occasional hold
      if(pi%4===0){ hold(time, pi%8, beat*1.5); }
      // Occasional slide
      if(pi%3===0){ slide(time+beat*density, pi%8, (pi+4)%8); }
      // Touch notes for MASTER+
      if((diff==='MASTER'||diff==='RE:MASTER') && pi%5===0){
        const ang=Math.random()*Math.PI*2, r=Math.random()*0.4+0.15;
        touch(time+beat*density*0.5, r*Math.cos(ang), r*Math.sin(ang));
      }
      time+=beat*(pat.length)*density + beat*0.5;
      pi++;
    }
    // RE:MASTER: extra 16th note bursts
    if(diff==='RE:MASTER'){
      for(let b=0;b<total;b+=4){
        for(let s=0;s<4;s++) tap(b*beat+s*beat*0.125,[0,4,2,6][s]);
      }
    }
  }
  n.sort((a,b)=>a.time-b.time);
  return n;
}

// ============================================================
//  CANVAS & LAYOUT
// ============================================================
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H,CX,CY,R; // R = panel radius

function resize(){
  const sz=Math.min(window.innerWidth,window.innerHeight)*0.99;
  W=H=cv.width=cv.height=sz;
  CX=CY=sz/2; R=sz*0.44;
}
resize();
window.addEventListener('resize',()=>{ resize(); if(gState==='playing') render(); });

function btnAngle(b){ return b/BTNS*Math.PI*2-Math.PI/2; }
function btnXY(b,r){ const a=btnAngle(b); return {x:CX+r*Math.cos(a),y:CY+r*Math.sin(a)}; }
const BTN_R = ()=>R*0.875; // button ring radius

// ============================================================
//  GAME STATE
// ============================================================
let gState='menu'; // menu|countdown|playing|result
let chart=[], cIdx=0;
let active=[];
let startT=null, nowMs=0;
let score=0,combo=0,maxCombo=0;
let jud={cp:0,p:0,g:0,go:0,m:0};
let totalNotes=0;
let effects=[];
let btnFlash={}; // btn -> remaining frames
let slideActive={}; // touchId -> {srcBtn, note}
let lastJudge=null;
let achieveAcc=0; // running achievement numerator

// ============================================================
//  FLOW
// ============================================================
function beginCountdown(){
  gState='countdown';
  document.getElementById('menu').style.display='none';
  document.getElementById('countdown').style.display='flex';
  let c=3;
  const el=document.getElementById('cdNum');
  el.textContent=c;
  const iv=setInterval(()=>{
    c--;
    if(c<=0){ clearInterval(iv); startGame(); }
    else el.textContent=c;
  },1000);
}
function startGame(){
  document.getElementById('countdown').style.display='none';
  gState='playing';
  chart=buildChart(selectedDiff);
  totalNotes=chart.length;
  cIdx=0; active=[]; effects=[]; btnFlash={}; slideActive={};
  score=0; combo=0; maxCombo=0; jud={cp:0,p:0,g:0,go:0,m:0}; achieveAcc=0;
  lastJudge=null;
  try{ ac().resume(); }catch(e){}
  startT=performance.now();
  startBgm();
  requestAnimationFrame(loop);
}
function retryGame(){ document.getElementById('result').style.display='none'; beginCountdown(); }
function gotoMenu(){ gState='menu'; document.getElementById('result').style.display='none'; document.getElementById('menu').style.display='flex'; }

function showResult(){
  gState='result';
  stopBgm();
  // Achievement rate
  const ach = Math.min(100.5, achieveAcc/Math.max(1,totalNotes)*100);
  let rank='D';
  if(ach>=100.5) rank='SSS+'; else if(ach>=100) rank='SSS'; else if(ach>=99.5) rank='SS+';
  else if(ach>=99) rank='SS'; else if(ach>=98) rank='S+'; else if(ach>=97) rank='S';
  else if(ach>=94) rank='AAA'; else if(ach>=90) rank='AA'; else if(ach>=80) rank='A';
  else if(ach>=70) rank='BBB'; else if(ach>=60) rank='BB'; else if(ach>=50) rank='B';
  else if(ach>=40) rank='C';
  const rColors={'SSS+':'#ff69b4','SSS':'#ffaa00','SS+':'#ffdd00','SS':'#ffdd00','S+':'#fff','S':'#fff','AAA':'#7dd4ff','AA':'#7dd4ff','A':'#a8ff7c'};
  document.getElementById('rRank').textContent=rank;
  document.getElementById('rRank').style.color=rColors[rank]||'#aaa';
  document.getElementById('rAch').textContent=ach.toFixed(4)+'%';
  document.getElementById('rCP').textContent=jud.cp;
  document.getElementById('rP').textContent=jud.p;
  document.getElementById('rG').textContent=jud.g;
  document.getElementById('rGO').textContent=jud.go;
  document.getElementById('rM').textContent=jud.m;
  document.getElementById('rMC').textContent=maxCombo;
  document.getElementById('result').style.display='flex';
}

// ============================================================
//  INPUT
// ============================================================
function getScale(){ return cv.width/cv.getBoundingClientRect().width; }
function cvCoords(clientX,clientY){ const r=cv.getBoundingClientRect(),s=getScale(); return {x:(clientX-r.left)*s,y:(clientY-r.top)*s}; }

cv.addEventListener('touchstart',e=>{ e.preventDefault(); Array.from(e.changedTouches).forEach(t=>{ const p=cvCoords(t.clientX,t.clientY); onPress(p.x,p.y,t.identifier); }); },{passive:false});
cv.addEventListener('touchend',e=>{ e.preventDefault(); Array.from(e.changedTouches).forEach(t=>{ onRelease(t.identifier); }); },{passive:false});
cv.addEventListener('touchcancel',e=>{ e.preventDefault(); Array.from(e.changedTouches).forEach(t=>onRelease(t.identifier)); },{passive:false});
cv.addEventListener('touchmove',e=>{ e.preventDefault(); Array.from(e.changedTouches).forEach(t=>{ const p=cvCoords(t.clientX,t.clientY); onMove(p.x,p.y,t.identifier); }); },{passive:false});
cv.addEventListener('mousedown',e=>{ const p=cvCoords(e.clientX,e.clientY); onPress(p.x,p.y,'M'); });
cv.addEventListener('mouseup',()=>onRelease('M'));
cv.addEventListener('mousemove',e=>{ if(e.buttons){ const p=cvCoords(e.clientX,e.clientY); onMove(p.x,p.y,'M'); }});

function getBtn(x,y){
  const dx=x-CX, dy=y-CY, dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<R*0.2) return -1;
  let a=Math.atan2(dy,dx)+Math.PI/2; if(a<0)a+=Math.PI*2;
  return Math.round(a/(Math.PI*2/BTNS))%BTNS;
}

function onPress(x,y,tid){
  if(gState!=='playing') return;
  try{ ac().resume(); }catch(e){}
  const btn=getBtn(x,y);
  btnFlash[btn!=-1?btn:0]=8;
  if(btn>=0) judgeBtn(btn,tid);
  else judgeTouchArea(x,y,tid);
}
function onRelease(tid){
  if(gState!=='playing') return;
  // End holds
  Object.keys(slideActive).forEach(k=>{ if(slideActive[k].tid===tid){ releaseSlide(k); delete slideActive[k]; }});
  // End hold notes
  active.forEach(n=>{ if(n.type===TYPE.HOLD && n.holding && n.holdTid===tid) endHold(n); });
}
function onMove(x,y,tid){
  if(gState!=='playing') return;
  const btn=getBtn(x,y);
  if(btn<0) return;
  // Check slide completion
  Object.entries(slideActive).forEach(([k,s])=>{
    if(s.tid===tid && btn===s.note.dst && !s.note.slideOk){
      s.note.slideOk=true;
      applyJudge(calcJudge(Math.abs(nowMs-s.note.time-s.note.dur*0.5)),s.note.btn,s.note.type===TYPE.BREAK);
    }
  });
}

function judgeBtn(btn,tid){
  // Find best matching note
  const note=active.find(n=>
    !n.judged && n.btn===btn &&
    (n.type===TYPE.TAP||n.type===TYPE.BREAK||n.type===TYPE.HOLD||n.type===TYPE.SLIDE) &&
    Math.abs(nowMs-n.time)<=TW.miss
  );
  if(!note){ btnFlash[btn]=6; return; }
  const diff=Math.abs(nowMs-note.time);
  if(note.type===TYPE.HOLD){
    note.judged=true; note.holding=true; note.holdTid=tid;
    sndHold(); addFx(btn,'cp');
  } else if(note.type===TYPE.SLIDE){
    note.judged=true;
    sndTap();
    addFx(btn, calcJudge(diff));
    slideActive[tid]={tid,note};
  } else {
    note.judged=true;
    const j=calcJudge(diff);
    applyJudge(j,btn,note.type===TYPE.BREAK);
  }
}
function judgeTouchArea(x,y,tid){
  const note=active.find(n=>{
    if(n.type!==TYPE.TOUCH||n.judged) return false;
    const tx=CX+n.px*R, ty=CY+n.py*R;
    const dx=x-tx,dy=y-ty;
    return Math.sqrt(dx*dx+dy*dy)<R*0.12 && Math.abs(nowMs-n.time)<=TW.miss;
  });
  if(!note) return;
  note.judged=true;
  const j=calcJudge(Math.abs(nowMs-note.time));
  applyJudge(j,-1,false,{x:CX+note.px*R,y:CY+note.py*R});
}
function endHold(note){
  note.holding=false;
  const diff=Math.abs(nowMs-(note.time+note.dur));
  const j=calcJudge(diff);
  applyJudge(j,note.btn,false);
}
function releaseSlide(tid){}

function calcJudge(diff){
  if(diff<=TW.cp)  return 'cp';
  if(diff<=TW.p)   return 'p';
  if(diff<=TW.g)   return 'g';
  if(diff<=TW.go)  return 'go';
  return 'm';
}
function applyJudge(j,btn,isBreak=false,pos=null){
  jud[j]++;
  const w = isBreak ? (j==='cp'?1.01:ACH_W[j]*1.0) : ACH_W[j];
  achieveAcc += w;
  if(j==='m'){
    combo=0; sndMiss();
    if(btn>=0) btnFlash[btn]=10;
    setLastJudge('MISS','#ef5350');
  } else {
    combo++; if(combo>maxCombo) maxCombo=combo;
    const sounds={cp:sndTap,p:sndTap,g:sndGreat,go:sndGood};
    (isBreak?sndBreak:(sounds[j]||sndTap))();
    if(btn>=0) addFx(btn,j,isBreak);
    else if(pos) addFxPos(pos.x,pos.y,j);
    const txts={cp:'Critical\nPerfect',p:'Perfect',g:'Great',go:'Good'};
    const cols={cp:'#ffec42',p:'#ffe082',g:'#64b5f6',go:'#81c784'};
    setLastJudge(txts[j],cols[j],isBreak);
  }
}
function setLastJudge(text,color,brk=false){ lastJudge={text,color,brk,t:nowMs}; }

// ============================================================
//  EFFECTS
// ============================================================
function addFx(btn,j,brk=false){
  const p=btnXY(btn,BTN_R());
  addFxPos(p.x,p.y,j,brk);
}
function addFxPos(x,y,j,brk=false){
  effects.push({x,y,j,brk,age:0,life:25});
  if(brk){ for(let i=0;i<8;i++) effects.push({x,y,j:'spark',brk:true,age:0,life:30,vx:Math.cos(i*Math.PI/4)*3,vy:Math.sin(i*Math.PI/4)*3,px:x,py:y}); }
}

// ============================================================
//  GAME LOOP
// ============================================================
function loop(ts){
  if(gState!=='playing') return;
  nowMs = ts - startT;

  // Spawn notes
  while(cIdx<chart.length){
    const approachMs = (APPROACH_TIME()/noteSpeed)*5;
    if(chart[cIdx].time - nowMs <= approachMs + 300){ active.push(chart[cIdx]); cIdx++; }
    else break;
  }

  // Auto-miss overdue notes
  active.forEach(n=>{
    if(!n.judged && nowMs-n.time > TW.miss){
      if(n.type===TYPE.SLIDE && !n.slideOk) { n.judged=true; jud.m++; combo=0; setLastJudge('MISS','#ef5350'); }
      else if(n.type===TYPE.TOUCH||n.type===TYPE.TAP||n.type===TYPE.BREAK) { n.judged=true; jud.m++; combo=0; setLastJudge('MISS','#ef5350'); }
    }
    if(n.type===TYPE.HOLD && n.holding && nowMs > n.time+n.dur+TW.miss) endHold(n);
  });

  // Cleanup
  active=active.filter(n=>{
    if(n.type===TYPE.HOLD && n.holding) return true;
    return !n.judged||(n.judged&&nowMs-n.time<500);
  });

  render();

  if(cIdx>=chart.length && active.every(n=>n.judged)){ showResult(); return; }
  requestAnimationFrame(loop);
}

function APPROACH_TIME(){ return 1500; } // base, scaled by noteSpeed

// ============================================================
//  RENDER
// ============================================================
function render(){
  ctx.clearRect(0,0,W,H);
  drawBg();
  drawPanel();
  drawNotes();
  drawEffects();
  drawHUD();
}

// --- BACKGROUND ---
function drawBg(){
  ctx.fillStyle='#030010'; ctx.fillRect(0,0,W,H);
  // outer glow
  const og=ctx.createRadialGradient(CX,CY,R*0.7,CX,CY,R*1.8);
  og.addColorStop(0,'rgba(80,30,160,0.0)');
  og.addColorStop(0.5,'rgba(80,30,160,0.15)');
  og.addColorStop(1,'rgba(80,30,160,0)');
  ctx.fillStyle=og; ctx.fillRect(0,0,W,H);
  // stars
  ctx.fillStyle='rgba(255,255,255,0.5)';
  for(let i=0;i<60;i++){
    const sx=(Math.sin(i*2.3)*0.5+0.5)*W, sy=(Math.cos(i*1.7)*0.5+0.5)*H;
    const sr=(Math.sin(i*0.8)*0.5+0.5)*1.2+0.2;
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
  }
}

// --- PANEL ---
function drawPanel(){
  // Segment fills
  for(let b=0;b<BTNS;b++){
    const a1=btnAngle(b)-Math.PI/BTNS, a2=a1+Math.PI/BTNS*2;
    const col=BTN_COLORS[b];
    const g=ctx.createRadialGradient(CX,CY,R*0.25,CX,CY,R*1.02);
    g.addColorStop(0,'rgba(5,0,20,0)');
    g.addColorStop(0.7,col+'08');
    g.addColorStop(1,col+'22');
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R*1.01,a1,a2); ctx.closePath();
    ctx.fillStyle=g; ctx.fill();
  }
  // Divider lines
  for(let b=0;b<BTNS;b++){
    const a=btnAngle(b)-Math.PI/BTNS;
    ctx.beginPath();
    ctx.moveTo(CX+R*0.15*Math.cos(a),CY+R*0.15*Math.sin(a));
    ctx.lineTo(CX+R*1.01*Math.cos(a),CY+R*1.01*Math.sin(a));
    ctx.strokeStyle='rgba(180,140,255,0.18)'; ctx.lineWidth=1; ctx.stroke();
  }
  // Concentric rings
  [[0.2,'rgba(150,100,255,0.06)'],[0.45,'rgba(150,100,255,0.06)'],[0.7,'rgba(150,100,255,0.1)']].forEach(([fr,col])=>{
    ctx.beginPath(); ctx.arc(CX,CY,R*fr,0,Math.PI*2);
    ctx.strokeStyle=col; ctx.lineWidth=1; ctx.stroke();
  });
  // JUDGMENT RING (button ring)
  ctx.beginPath(); ctx.arc(CX,CY,BTN_R(),0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=3; ctx.stroke();
  // inner glow ring
  ctx.beginPath(); ctx.arc(CX,CY,BTN_R(),0,Math.PI*2);
  ctx.shadowColor='rgba(255,255,255,0.8)'; ctx.shadowBlur=8;
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();
  ctx.shadowBlur=0;

  // Outer panel ring
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,160,255,0.7)'; ctx.lineWidth=3; ctx.stroke();
  // Outer glow
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.shadowColor='rgba(180,120,255,0.9)'; ctx.shadowBlur=12;
  ctx.strokeStyle='rgba(200,160,255,0.3)'; ctx.lineWidth=2; ctx.stroke();
  ctx.shadowBlur=0;

  // Center circle
  const cg=ctx.createRadialGradient(CX,CY,0,CX,CY,R*0.13);
  cg.addColorStop(0,'#220055'); cg.addColorStop(1,'#0a001a');
  ctx.beginPath(); ctx.arc(CX,CY,R*0.13,0,Math.PI*2);
  ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='rgba(200,150,255,0.5)'; ctx.lineWidth=2; ctx.stroke();

  // Buttons
  for(let b=0;b<BTNS;b++) drawButton(b);
}

function drawButton(b){
  const p=btnXY(b,BTN_R());
  const br=R*0.068;
  const col=BTN_COLORS[b];
  const fl=btnFlash[b]||0;
  if(fl>0) btnFlash[b]=fl-1;

  // Outer glow when flash
  if(fl>3){
    const frac=fl/8;
    ctx.beginPath(); ctx.arc(p.x,p.y,br*2.5,0,Math.PI*2);
    const gg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,br*2.5);
    gg.addColorStop(0,col+Math.floor(frac*180).toString(16).padStart(2,'0'));
    gg.addColorStop(1,col+'00');
    ctx.fillStyle=gg; ctx.fill();
  }

  // Button body
  const bg=ctx.createRadialGradient(p.x-br*0.25,p.y-br*0.25,0,p.x,p.y,br);
  if(fl>3){
    bg.addColorStop(0,'#ffffff'); bg.addColorStop(0.35,col); bg.addColorStop(1,col+'88');
  } else {
    bg.addColorStop(0,col+'ee'); bg.addColorStop(0.6,col+'99'); bg.addColorStop(1,col+'33');
  }
  ctx.beginPath(); ctx.arc(p.x,p.y,br,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();

  // Button ring
  ctx.strokeStyle=fl>3?'#fff':col; ctx.lineWidth=fl>3?2.5:1.8;
  ctx.beginPath(); ctx.arc(p.x,p.y,br,0,Math.PI*2); ctx.stroke();
  // highlight arc
  ctx.save(); ctx.clip();
  const hg=ctx.createLinearGradient(p.x-br,p.y-br,p.x+br,p.y+br);
  hg.addColorStop(0,'rgba(255,255,255,0.35)'); hg.addColorStop(0.5,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(p.x,p.y,br,0,Math.PI*2);
  ctx.fillStyle=hg; ctx.fill();
  ctx.restore();

  // Number
  ctx.fillStyle=fl>3?'#000':'rgba(255,255,255,0.9)';
  ctx.font=`bold ${br*1.05}px 'Arial Black',Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(b+1,p.x,p.y);
}

// --- NOTES ---
function drawNotes(){
  // Draw holds first (below taps)
  active.forEach(n=>{ if(n.type===TYPE.HOLD) drawHoldNote(n); });
  // Slides paths
  active.forEach(n=>{ if(n.type===TYPE.SLIDE) drawSlidePath(n); });
  // All other notes on top
  active.forEach(n=>{
    if(n.type===TYPE.HOLD) return;
    if(n.type===TYPE.SLIDE) { drawSlideNote(n); return; }
    if(n.type===TYPE.TOUCH) { drawTouchNote(n); return; }
    drawTapNote(n);
  });
}

function noteProgress(n){
  const appMs=(APPROACH_TIME()/noteSpeed)*5;
  return Math.max(0,Math.min(1,(nowMs-(n.time-appMs))/appMs));
}
function notePosAlong(b,frac){ return btnXY(b, frac*BTN_R()); }

function drawTapNote(n){
  if(n.judged) return;
  const prog=noteProgress(n);
  const pos=notePosAlong(n.btn,prog);
  const col=n.type===TYPE.BREAK?'#ffa500':BTN_COLORS[n.btn];
  const nr=R*0.055*(0.7+prog*0.3);
  const isBreak=n.type===TYPE.BREAK;

  // Approach ring (at button pos, shrinks from outside)
  const bpos=btnXY(n.btn,BTN_R());
  const aring=R*0.055*(1+(1-prog)*2.8);
  ctx.beginPath(); ctx.arc(bpos.x,bpos.y,aring,0,Math.PI*2);
  const alpha=Math.floor((0.1+(prog)*0.5)*255).toString(16).padStart(2,'0');
  ctx.strokeStyle=(isBreak?'#ffdd00':col)+alpha;
  ctx.lineWidth=2.5; ctx.stroke();

  // Glow
  if(prog>0.6){
    const gfrac=(prog-0.6)/0.4;
    ctx.beginPath(); ctx.arc(pos.x,pos.y,nr*2,0,Math.PI*2);
    const gg=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,nr*2);
    gg.addColorStop(0,col+Math.floor(gfrac*80).toString(16).padStart(2,'0'));
    gg.addColorStop(1,col+'00');
    ctx.fillStyle=gg; ctx.fill();
  }

  // Note body
  ctx.beginPath(); ctx.arc(pos.x,pos.y,nr,0,Math.PI*2);
  const bg=ctx.createRadialGradient(pos.x-nr*0.3,pos.y-nr*0.3,0,pos.x,pos.y,nr);
  if(isBreak){
    bg.addColorStop(0,'#fff8c0'); bg.addColorStop(0.4,'#ffa500'); bg.addColorStop(1,'#ff440088');
  } else {
    bg.addColorStop(0,'#ffffff'); bg.addColorStop(0.4,col); bg.addColorStop(1,col+'66');
  }
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle=isBreak?'#ffe000':'rgba(255,255,255,0.9)'; ctx.lineWidth=isBreak?2.5:2;
  ctx.stroke();
  if(isBreak){
    ctx.shadowColor='#ffa500'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(pos.x,pos.y,nr,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
  }
}

function drawHoldNote(n){
  const prog=noteProgress(n);
  const headPos=notePosAlong(n.btn,prog);
  const endPos=btnXY(n.btn,BTN_R());
  const col=BTN_COLORS[n.btn];
  if(n.judged && !n.holding) return;

  // Trail
  const tg=ctx.createLinearGradient(CX+(CX-headPos.x)*0.1,CY+(CY-headPos.y)*0.1,endPos.x,endPos.y);
  tg.addColorStop(0,col+'00'); tg.addColorStop(1,col+'77');
  ctx.beginPath(); ctx.moveTo(headPos.x,headPos.y); ctx.lineTo(endPos.x,endPos.y);
  ctx.strokeStyle=tg; ctx.lineWidth=R*0.06; ctx.lineCap='round'; ctx.stroke();

  // Approach ring
  const bpos=btnXY(n.btn,BTN_R());
  const aring=R*0.055*(1+(1-prog)*2.8);
  ctx.beginPath(); ctx.arc(bpos.x,bpos.y,aring,0,Math.PI*2);
  ctx.strokeStyle=col+'66'; ctx.lineWidth=2.5; ctx.stroke();

  // Head
  const nr=R*0.06*(0.7+prog*0.3);
  ctx.beginPath(); ctx.arc(headPos.x,headPos.y,nr,0,Math.PI*2);
  const bg=ctx.createRadialGradient(headPos.x-nr*0.3,headPos.y-nr*0.3,0,headPos.x,headPos.y,nr);
  bg.addColorStop(0,'#fff'); bg.addColorStop(0.4,col); bg.addColorStop(1,col+'55');
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=2; ctx.stroke();
  // "HOLD" marker
  ctx.fillStyle='#fff'; ctx.font=`bold ${nr*0.7}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('H',headPos.x,headPos.y);

  // Hold duration bar at button pos
  if(n.judged && n.holding){
    const remain=Math.max(0,(n.time+n.dur-nowMs)/n.dur);
    const ang1=btnAngle(n.btn)-Math.PI/BTNS*0.7, ang2=ang1+Math.PI/BTNS*1.4*remain;
    ctx.beginPath(); ctx.arc(CX,CY,BTN_R(),ang1,ang2);
    ctx.strokeStyle=col; ctx.lineWidth=6; ctx.lineCap='round'; ctx.stroke();
  }
}

function drawSlidePath(n){
  if(n.judged && n.slideOk) return;
  const src=btnXY(n.btn,BTN_R());
  const dst=btnXY(n.dst,BTN_R());
  // Draw dotted path
  ctx.setLineDash([8,8]); ctx.lineDashOffset=-nowMs*0.05;
  ctx.beginPath(); ctx.moveTo(src.x,src.y); ctx.lineTo(dst.x,dst.y);
  ctx.strokeStyle='rgba(255,140,0,0.55)'; ctx.lineWidth=4; ctx.stroke();
  ctx.setLineDash([]);
  // Arrow
  const mx=(src.x+dst.x)/2, my=(src.y+dst.y)/2;
  const ang=Math.atan2(dst.y-src.y,dst.x-src.x);
  ctx.save(); ctx.translate(mx,my); ctx.rotate(ang);
  ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-6,-6); ctx.lineTo(-6,6); ctx.closePath();
  ctx.fillStyle='rgba(255,140,0,0.7)'; ctx.fill();
  ctx.restore();
}

function drawSlideNote(n){
  if(n.judged) return;
  const prog=noteProgress(n);
  const pos=notePosAlong(n.btn,prog);
  const nr=R*0.062*(0.7+prog*0.3);
  // Approach ring
  const bpos=btnXY(n.btn,BTN_R());
  const aring=R*0.062*(1+(1-prog)*2.8);
  ctx.beginPath(); ctx.arc(bpos.x,bpos.y,aring,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,140,0,0.5)'; ctx.lineWidth=2.5; ctx.stroke();
  // Star shape
  drawStar(pos.x,pos.y,nr,5,'#ffe082','#ff8c00');
}

function drawStar(x,y,r,pts,fill,stroke){
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const a=i*Math.PI/pts-Math.PI/2;
    const rr=i%2===0?r:r*0.45;
    if(i===0) ctx.moveTo(x+rr*Math.cos(a),y+rr*Math.sin(a));
    else ctx.lineTo(x+rr*Math.cos(a),y+rr*Math.sin(a));
  }
  ctx.closePath();
  ctx.shadowColor='#ffa500'; ctx.shadowBlur=6;
  ctx.fillStyle=fill; ctx.fill();
  ctx.strokeStyle=stroke; ctx.lineWidth=1.5; ctx.stroke();
  ctx.shadowBlur=0;
}

function drawTouchNote(n){
  if(n.judged) return;
  const prog=noteProgress(n);
  const x=CX+n.px*R, y=CY+n.py*R;
  const nr=R*0.07*(0.7+prog*0.3);
  // Approach ring
  const aring=nr*(1+(1-prog)*2);
  ctx.beginPath(); ctx.arc(x,y,aring,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,100,200,0.4)'; ctx.lineWidth=2; ctx.stroke();
  // Hexagon
  drawHex(x,y,nr,'#ff69b4','#ff1493');
  // DX "T" label
  ctx.fillStyle='#fff'; ctx.font=`bold ${nr*0.75}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('T',x,y);
}

function drawHex(x,y,r,fill,stroke){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3-Math.PI/6;
    if(i===0) ctx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a));
    else ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));
  }
  ctx.closePath();
  ctx.shadowColor='#ff69b4'; ctx.shadowBlur=8;
  const bg=ctx.createRadialGradient(x,y,0,x,y,r);
  bg.addColorStop(0,'#ffb0ee'); bg.addColorStop(1,fill+'88');
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle=stroke; ctx.lineWidth=2; ctx.stroke();
  ctx.shadowBlur=0;
}

// --- EFFECTS ---
function drawEffects(){
  effects=effects.filter(e=>e.age<e.life);
  effects.forEach(e=>{
    e.age++;
    const frac=e.age/e.life;
    const cols={cp:'#ffec42',p:'#ffe082',g:'#64b5f6',go:'#81c784',m:'#ef5350',spark:'#ffcc00'};
    const col=cols[e.j]||'#fff';

    if(e.j==='spark'){
      e.px+=e.vx; e.py+=e.vy; e.vx*=0.92; e.vy*=0.92;
      ctx.beginPath(); ctx.arc(e.px,e.py,3*(1-frac)+1,0,Math.PI*2);
      ctx.fillStyle=col+Math.floor((1-frac)*255).toString(16).padStart(2,'0');
      ctx.fill();
      return;
    }
    // Ring expand
    const rr=R*0.055*(1.2+frac*3);
    ctx.beginPath(); ctx.arc(e.x,e.y,rr,0,Math.PI*2);
    ctx.strokeStyle=col+Math.floor((1-frac)*200).toString(16).padStart(2,'0');
    ctx.lineWidth=e.brk?5:3; ctx.stroke();
    // Center flash
    if(frac<0.4){
      const cr=R*0.055*(1-frac*2.5);
      const cg=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,Math.max(1,cr));
      cg.addColorStop(0,col+Math.floor((1-frac/0.4)*180).toString(16).padStart(2,'0'));
      cg.addColorStop(1,col+'00');
      ctx.beginPath(); ctx.arc(e.x,e.y,Math.max(1,cr),0,Math.PI*2);
      ctx.fillStyle=cg; ctx.fill();
    }
    if(e.brk){
      // ray burst for break
      for(let i=0;i<8;i++){
        const a=i*Math.PI/4+frac;
        ctx.beginPath(); ctx.moveTo(e.x,e.y);
        ctx.lineTo(e.x+Math.cos(a)*rr*1.5,e.y+Math.sin(a)*rr*1.5);
        ctx.strokeStyle='rgba(255,220,0,'+((1-frac)*0.4)+')';
        ctx.lineWidth=2; ctx.stroke();
      }
    }
  });
}

// --- HUD ---
function drawHUD(){
  // Judgment text
  if(lastJudge && nowMs-lastJudge.t<700){
    const age=nowMs-lastJudge.t, alpha=1-age/700;
    const lines=lastJudge.text.split('\n');
    ctx.save(); ctx.globalAlpha=alpha;
    lines.forEach((line,i)=>{
      ctx.fillStyle=lastJudge.color;
      ctx.font=`bold ${R*0.075}px 'Arial Black',Arial`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      if(lastJudge.brk){
        ctx.shadowColor='#ffaa00'; ctx.shadowBlur=15;
      }
      ctx.fillText(line,CX,CY+R*0.22+i*R*0.09);
    });
    ctx.shadowBlur=0; ctx.restore();
  }

  // Combo
  if(combo>0){
    ctx.fillStyle='#ffec42';
    ctx.font=`bold ${R*0.14}px 'Arial Black',Arial`;
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.shadowColor='rgba(255,200,0,0.5)'; ctx.shadowBlur=10;
    ctx.fillText(combo,CX,CY-R*0.05);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,236,66,0.6)';
    ctx.font=`${R*0.045}px Arial`; ctx.textBaseline='top';
    ctx.fillText('COMBO',CX,CY);
  }

  // Achievement top-left
  const ach=Math.min(100.5,achieveAcc/Math.max(1,totalNotes)*100);
  ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.font=`bold ${W*0.038}px 'Arial Narrow',Arial`;
  ctx.fillText(ach.toFixed(4)+'%',W*0.025,H*0.022);

  // Diff top-right
  ctx.fillStyle=DIFF_COLORS[selectedDiff]||'#fff';
  ctx.font=`bold ${W*0.028}px Arial`;
  ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.fillText(selectedDiff,W*0.975,H*0.022);

  // Progress bar
  const prog=cIdx/Math.max(1,totalNotes);
  const bx=W*0.05,bw=W*0.9,by=H*0.966,bh=5;
  ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(bx,by,bw,bh);
  const pg=ctx.createLinearGradient(bx,0,bx+bw,0);
  pg.addColorStop(0,'#ff69b4'); pg.addColorStop(0.5,'#aa55ff'); pg.addColorStop(1,'#00e5ff');
  ctx.fillStyle=pg; ctx.fillRect(bx,by,bw*prog,bh);

  // Note counts bottom-left
  const labels=[['CP','#ffec42',jud.cp],['P','#ffe082',jud.p],['G','#64b5f6',jud.g],['GO','#81c784',jud.go],['M','#ef5350',jud.m]];
  labels.forEach(([lbl,col,val],i)=>{
    ctx.fillStyle=col; ctx.font=`${W*0.022}px Arial`;
    ctx.textAlign='left'; ctx.textBaseline='bottom';
    ctx.fillText(`${lbl}: ${val}`,W*0.025,H*0.96-i*W*0.026);
  });
}

// Initial render
render();
</script>
